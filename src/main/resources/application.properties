spring.application.name=VitaSync

# --- PostgreSQL Database ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aitracker}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:aitracker}
spring.datasource.password=${DB_PASSWORD:aitracker123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Groq AI ---
spring.ai.openai.api-key=${GROQ_API_KEY:your-groq-api-key-here}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# --- Server ---
server.port=${PORT:8080}

# --- Google OAuth2 ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# --- Logging ---
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.thegirlcoded.aitracker=INFO
logging.level.org.hibernate=WARN

# --- Session Cookie ---
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true